<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeStrike | 2P Fighter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu-screen" class="screen active">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <h1 class="title">TIME<span>STRIKE</span></h1>
      <p class="subtitle">2-Player Platformer Fighter</p>
      <button id="start-btn" class="btn-main">FIGHT</button>
      <button id="controls-btn" class="btn-secondary">CONTROLS</button>
    </div>
  </div>

  <div id="controls-screen" class="screen">
    <div class="controls-content">
      <h2>CONTROLS</h2>
      <div class="controls-grid">
        <div class="player-card p1">
          <h3>PLAYER 1</h3>
          <div class="key-list">
            <div class="key-row"><kbd>W</kbd><span>Jump</span></div>
            <div class="key-row"><kbd>A</kbd><span>Left</span></div>
            <div class="key-row"><kbd>D</kbd><span>Right</span></div>
            <div class="key-row"><kbd>X</kbd><span>Attack (1s cooldown)</span></div>
            <div class="key-row ability"><kbd>Z</kbd><span>⏱ STOP TIME (3s)</span></div>
          </div>
        </div>
        <div class="player-card p2">
          <h3>PLAYER 2</h3>
          <div class="key-list">
            <div class="key-row"><kbd>↑</kbd><span>Jump</span></div>
            <div class="key-row"><kbd>←</kbd><span>Left</span></div>
            <div class="key-row"><kbd>→</kbd><span>Right</span></div>
            <div class="key-row"><kbd>1</kbd><span>Attack</span></div>
            <div class="key-row ability"><kbd>0</kbd><span>⚡ DASH (damages)</span></div>
          </div>
        </div>
      </div>
      <button id="back-btn" class="btn-secondary">BACK</button>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div id="hud">
      <div class="hud-player p1-hud">
        <span class="player-label">P1</span>
        <div class="health-bar-wrap">
          <div class="health-bar" id="p1-health-bar"></div>
        </div>
        <span class="health-text" id="p1-health-text">100</span>
        <div class="ability-cooldown" id="p1-ability-status">Z: READY</div>
      </div>
      <div class="hud-center">
        <div id="timer-display">60</div>
        <div id="time-stop-overlay" class="time-stop-flash hidden">⏱ TIME STOPPED</div>
      </div>
      <div class="hud-player p2-hud">
        <span class="player-label">P2</span>
        <div class="health-bar-wrap">
          <div class="health-bar" id="p2-health-bar"></div>
        </div>
        <span class="health-text" id="p2-health-text">100</span>
        <div class="ability-cooldown" id="p2-ability-status">0: READY</div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>
  </div>

  <div id="gameover-screen" class="screen">
    <div class="gameover-content">
      <h2 id="winner-text">PLAYER 1 WINS!</h2>
      <button id="rematch-btn" class="btn-main">REMATCH</button>
      <button id="menu-btn" class="btn-secondary">MENU</button>
    </div>
  </div>

  <script src="engine.js"></script>
  <script src="player.js"></script>
  <script src="game.js"></script>
</body>
</html>
